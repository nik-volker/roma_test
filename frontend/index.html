    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Relationship Consultant | Thoughtful relationship support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-shell">
        <div class="ambient ambient-left" aria-hidden="true"></div>
        <div class="ambient ambient-right" aria-hidden="true"></div>

        <header class="topbar">
            <div class="brand-block">
                <span class="brand-eyebrow" data-i18n="brandEyebrow">AI relationship consultant</span>
                <h1 data-i18n="brandTitle">Relationship clarity, one message at a time</h1>
                <p data-i18n="brandSubtitle">Reflect on difficult moments, get grounded questions, and receive practical
                    techniques for your next step.</p>
            </div>

            <div class="toolbar">
                <button id="clear-button" type="button">Clear</button>
                <div class="lang-switch">
                    <label class="sr-only" for="lang-select">Language</label>
                    <select id="lang-select" aria-label="Language switcher">
                        <option value="en">En</option>
                        <option value="ru">Ru</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="chat-layout">
            <section class="chat-wrapper">
                <div id="chat-container"></div>
            </section>
        </main>

        <footer class="input-area">
            <label class="sr-only" id="message-input-label" for="message-input" data-i18n="messageLabel">Your
                message</label>
            <div class="input-panel">
                <textarea id="message-input" placeholder="What would you like to discuss?" autocomplete="off"
                    rows="1"></textarea>
                <div class="button-group">
                    <button id="send-button" type="button">Send</button>
                </div>
            </div>
            <div class="credits-line credits-line--ru">
                Методика: <a href="https://www.tiktok.com/@inevskaya" target="_blank" rel="noopener noreferrer">Олеся
                    Иневская</a>
                • Разработка: <a href="https://t.me/Nik_volker" target="_blank" rel="noopener noreferrer">Neuro Labs</a>
            </div>
            <div class="credits-line credits-line--en">
                Methodology: <a href="https://www.tiktok.com/@inevskaya" target="_blank"
                    rel="noopener noreferrer">Olesya
                    Inevskaya</a>
                • Development: <a href="https://t.me/Nik_volker" target="_blank" rel="noopener noreferrer">Neuro
                    Labs</a>
            </div>
        </footer>
    </div>

    <script type="module" src="js/app.js"></script>
