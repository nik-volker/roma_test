<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Психолог | Помощь в отношениях</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <!-- Заголовок -->
        <div class="header">
            <h1>💭 AI Психолог</h1>
            <p>Поддержка в вопросах отношений</p>
        </div>

        <!-- Индикатор состояния -->
        <div class="state-indicator-wrapper">
            <div id="state-indicator"></div>
        </div>

        <!-- Основной контейнер чата -->
        <div class="chat-wrapper">
            <div id="chat-container"></div>
        </div>

        <!-- Input область -->
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Расскажи, что тебя беспокоит..." autocomplete="off">
            <div class="button-group">
                <button id="send-button">Отправить</button>
                <button id="clear-button">Очистить</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
